<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    .flex-row { display: flex; flex-direction: row; }
  </style>
</head>
<body>
  <div class="flex-row" style="width: 300px;">
    <div style="flex: 1; background: red; height: 50px;"></div>
    <div style="flex: 2; background: green; height: 50px;"></div>
    <div style="flex: 1; background: blue; height: 50px;"></div>
  </div>
</body>
</html>
