<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Flex Grow and Shrink</title>
        <style>
            .container {
                display: flex;
                width: 600px;
                height: 100px;
            }
            .item {
                height: 60px;
            }
        </style>
    </head>
    <body>
        <!-- Grow: 100+100+100=300 base, 300 free, grow 1:2:3 -->
        <div class="container">
            <div
                class="item"
                style="width: 100px; flex-grow: 1; background: #e74c3c"
            ></div>
            <div
                class="item"
                style="width: 100px; flex-grow: 2; background: #3498db"
            ></div>
            <div
                class="item"
                style="width: 100px; flex-grow: 3; background: #2ecc71"
            ></div>
        </div>
        <!-- Shrink: 3 items at 250px in 600px, equal shrink -->
        <div class="container">
            <div class="item" style="width: 250px; background: #e74c3c"></div>
            <div class="item" style="width: 250px; background: #3498db"></div>
            <div class="item" style="width: 250px; background: #2ecc71"></div>
        </div>
        <!-- Mixed: only second item grows -->
        <div class="container">
            <div
                class="item"
                style="width: 200px; flex-grow: 0; background: #e74c3c"
            ></div>
            <div
                class="item"
                style="width: 200px; flex-grow: 1; background: #3498db"
            ></div>
        </div>
    </body>
</html>
