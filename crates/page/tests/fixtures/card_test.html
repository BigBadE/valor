<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    .container { display: flex; flex-wrap: wrap; gap: 5px; }
    .card { width: 100px; padding: 10px; margin: 5px; border: 1px solid #ccc; }
    .nested { padding: 5px; margin: 2px; border: 1px solid #999; }
    .deep { padding: 2px; margin: 1px; background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card"><div class="nested"><div class="deep">Card 1</div></div></div>
    <div class="card"><div class="nested"><div class="deep">Card 2</div></div></div>
  </div>
</body>
</html>
