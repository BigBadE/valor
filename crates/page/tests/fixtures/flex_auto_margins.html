<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Flex Auto Margins</title>
    </head>
    <body>
        <div style="display: flex; width: 600px; height: 100px">
            <div style="width: 100px; height: 60px; background: #e74c3c"></div>
            <div
                style="
                    width: 100px;
                    height: 60px;
                    margin-left: auto;
                    background: #3498db;
                "
            ></div>
        </div>
        <div style="display: flex; width: 600px; height: 100px">
            <div
                style="
                    width: 100px;
                    height: 60px;
                    margin-top: auto;
                    margin-bottom: auto;
                    background: #e74c3c;
                "
            ></div>
        </div>
    </body>
</html>
