<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flex Order</title>
</head>
<body>
  <!-- order reorders visual layout: order 3,1,2 → visual order B,C,A -->
  <div style="display: flex; width: 300px; height: 100px;">
    <div style="order: 3; width: 100px; height: 60px; background: #e74c3c;"></div>
    <div style="order: 1; width: 100px; height: 60px; background: #3498db;"></div>
    <div style="order: 2; width: 100px; height: 60px; background: #2ecc71;"></div>
  </div>
</body>
</html>
