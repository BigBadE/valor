<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flex Align Self</title>
  <style>
    .container { display: flex; width: 400px; height: 200px; align-items: flex-start; }
    .item { width: 80px; height: 60px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="item" style="align-self: flex-start; background: #e74c3c;"></div>
    <div class="item" style="align-self: center; background: #3498db;"></div>
    <div class="item" style="align-self: flex-end; background: #2ecc71;"></div>
    <div class="item" style="align-self: stretch; background: #f39c12;"></div>
  </div>
</body>
</html>
