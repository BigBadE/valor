<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Flex Wrap Justify</title>
        <style>
            .container {
                display: flex;
                flex-wrap: wrap;
                width: 300px;
                height: 200px;
            }
            .item {
                width: 120px;
                height: 60px;
            }
        </style>
    </head>
    <body>
        <!-- flex-start (default) -->
        <div class="container" style="justify-content: flex-start">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
        <!-- flex-end: items pushed to end of each line -->
        <div class="container" style="justify-content: flex-end">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
        <!-- center: items centered on each line -->
        <div class="container" style="justify-content: center">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
        <!-- space-between: items spread across each line -->
        <div class="container" style="justify-content: space-between">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
        <!-- space-around: equal space around items on each line -->
        <div class="container" style="justify-content: space-around">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
        <!-- space-evenly: equal space between and around items on each line -->
        <div class="container" style="justify-content: space-evenly">
            <div class="item" style="background: #e74c3c"></div>
            <div class="item" style="background: #3498db"></div>
            <div class="item" style="background: #2ecc71"></div>
        </div>
    </body>
</html>
