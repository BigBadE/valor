<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flex Shrink Debug</title>
</head>
<body>
  <!-- 3 items at 250px each in 600px = need to shrink 150px total -->
  <div style="display: flex; width: 600px; height: 100px;">
    <div style="width: 250px; height: 60px; background: #e74c3c;"></div>
    <div style="width: 250px; height: 60px; background: #3498db;"></div>
    <div style="width: 250px; height: 60px; background: #2ecc71;"></div>
  </div>
</body>
</html>
