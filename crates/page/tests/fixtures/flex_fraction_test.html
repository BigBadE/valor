<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 10px; }
    .flex-row { display: flex; flex-direction: row; width: 100%; }
    .flex-col { display: flex; flex-direction: column; }
    .cell { width: 20px; height: 20px; border: 1px solid #333; }
    .justify-center { justify-content: center; }
    .align-center { align-items: center; }
    .border { border: 1px solid #000; }
  </style>
</head>
<body>
  <div class="flex-row" style="height: 200px;">
    <div class="flex-col" style="flex: 1; background: #ecf0f1;"></div>
    <div class="flex-col" style="flex: 2; background: #bdc3c7;">
      <div class="flex-row" style="flex: 1;">
        <div class="flex-col justify-center align-center border" style="flex: 1;"><div class="cell"></div></div>
        <div class="flex-col justify-center align-center border" style="flex: 1;"><div class="cell"></div></div>
        <div class="flex-col justify-center align-center border" style="flex: 1;"><div class="cell"></div></div>
      </div>
    </div>
    <div class="flex-col" style="flex: 1; background: #95a5a6;"></div>
  </div>
</body>
</html>
