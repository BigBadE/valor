<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flex Auto Minimum Size</title>
  <style>
    .container {
      display: flex;
      width: 300px;
      height: 60px;
    }
  </style>
</head>
<body>
  <!-- Auto minimum: items with text should not shrink below their
       min-content width (longest word). These items have flex-basis: 0
       but text content prevents them from collapsing to 0. -->
  <div class="container">
    <div style="flex: 1; background: #e74c3c;">Supercalifragilistic</div>
    <div style="flex: 1; background: #3498db;">Hi</div>
  </div>
  <!-- Explicit min-width: 0 disables auto minimum, allowing shrink to 0 -->
  <div class="container">
    <div style="flex: 1; min-width: 0; background: #e74c3c;">Supercalifragilistic</div>
    <div style="flex: 1; min-width: 0; background: #3498db;">Hi</div>
  </div>
  <!-- overflow: hidden disables auto minimum (per section 4.5) -->
  <div class="container">
    <div style="flex: 1; overflow: hidden; background: #e74c3c;">Supercalifragilistic</div>
    <div style="flex: 1; overflow: hidden; background: #3498db;">Hi</div>
  </div>
  <!-- Empty items: auto minimum is 0 since no content -->
  <div class="container">
    <div style="flex-basis: 200px; flex-shrink: 1; background: #e74c3c;"></div>
    <div style="flex-basis: 200px; flex-shrink: 1; background: #3498db;"></div>
  </div>
</body>
</html>
