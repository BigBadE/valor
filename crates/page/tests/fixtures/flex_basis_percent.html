<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Flex Basis Percent</title>
</head>
<body>
  <!-- Percentage flex-basis: 25% + 25% + 50% = 100% of 600px -->
  <div style="display: flex; width: 600px; height: 100px;">
    <div style="flex-basis: 25%; height: 60px; background: #e74c3c;"></div>
    <div style="flex-basis: 25%; height: 60px; background: #3498db;"></div>
    <div style="flex-basis: 50%; height: 60px; background: #2ecc71;"></div>
  </div>
</body>
</html>
